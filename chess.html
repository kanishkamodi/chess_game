<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single-File CSS Chessboard</title>
  <style>
    /* Center the board perfectly on the screen */
    body {
      margin: 0;
      padding: 0;
      background-color: #312e2b; /* Sleek dark theme background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* The 8x8 Grid Container */
    .chessboard {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 90vw;
      height: 90vw;
      max-width: 600px;
      max-height: 600px;
      border: 4px solid #1e1c1a;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
    }

    /* Base styles for every single square */
    .square {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: calc(600px / 12); /* Scaled font for desktop */
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s ease;
    }

    /* Make sure the pieces scale down cleanly on mobile screens */
    @media (max-width: 600px) {
      .square {
        font-size: 10vw;
      }
    }

    /* Classic Tournament Color Palette */
    .light {
      background-color: #eeeed2;
      color: #312e2b;
    }

    .dark {
      background-color: #769656;
      color: #ffffff;
    }

    /* Subtle visual feedback when you hover over a square */
    .square:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>

  <div class="chessboard">
    <!-- Row 8 (Black Pieces) -->
    <div class="square light">&#9820;</div>
    <div class="square dark">&#9822;</div>
    <div class="square light">&#9821;</div>
    <div class="square dark">&#9819;</div>
    <div class="square light">&#9818;</div>
    <div class="square dark">&#9821;</div>
    <div class="square light">&#9822;</div>
    <div class="square dark">&#9820;</div>

    <!-- Row 7 (Black Pawns) -->
    <div class="square dark">&#9823;</div>
    <div class="square light">&#9823;</div>
    <div class="square dark">&#9823;</div>
    <div class="square light">&#9823;</div>
    <div class="square dark">&#9823;</div>
    <div class="square light">&#9823;</div>
    <div class="square dark">&#9823;</div>
    <div class="square light">&#9823;</div>

    <!-- Row 6 (Empty) -->
    <div class="square light"></div><div class="square dark"></div>
    <div class="square light"></div><div class="square dark"></div>
    <div class="square light"></div><div class="square dark"></div>
    <div class="square light"></div><div class="square dark"></div>

    <!-- Row 5 (Empty) -->
    <div class="square dark"></div><div class="square light"></div>
    <div class="square dark"></div><div class="square light"></div>
    <div class="square dark"></div><div class="square light"></div>
    <div class="square dark"></div><div class="square light"></div>

    <!-- Row 4 (Empty) -->
    <div class="square light"></div><div class="square dark"></div>
    <div class="square light"></div><div class="square dark"></div>
    <div class="square light"></div><div class="square dark"></div>
    <div class="square light"></div><div class="square dark"></div>

    <!-- Row 3 (Empty) -->
    <div class="square dark"></div><div class="square light"></div>
    <div class="square dark"></div><div class="square light"></div>
    <div class="square dark"></div><div class="square light"></div>
    <div class="square dark"></div><div class="square light"></div>

    <!-- Row 2 (White Pawns) -->
    <div class="square light">&#9817;</div>
    <div class="square dark">&#9817;</div>
    <div class="square light">&#9817;</div>
    <div class="square dark">&#9817;</div>
    <div class="square light">&#9817;</div>
    <div class="square dark">&#9817;</div>
    <div class="square light">&#9817;</div>
    <div class="square dark">&#9817;</div>

    <!-- Row 1 (White Pieces) -->
    <div class="square dark">&#9814;</div>
    <div class="square light">&#9816;</div>
    <div class="square dark">&#9815;</div>
    <div class="square light">&#9813;</div>
    <div class="square dark">&#9812;</div>
    <div class="square light">&#9815;</div>
    <div class="square dark">&#9816;</div>
    <div class="square light">&#9814;</div>
  </div>

</body>
</html>
